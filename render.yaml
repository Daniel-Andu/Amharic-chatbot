services:
  # Backend API Service
  - type: web
    name: amharic-chatbot-backend
    env: node
    plan: free
    repo: https://github.com/Daniel-Andu/Amharic-chatbot.git
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # User must set this
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: HUGGINGFACE_API_KEY
        sync: false # User must set this
      - key: GROQ_API_KEY
        sync: false # User must set this

  # Customer Chat Frontend
  - type: web
    name: amharic-chatbot-customer
    env: static
    plan: free
    repo: https://github.com/Daniel-Andu/Amharic-chatbot.git
    rootDir: customer-chat
    buildCommand: npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://amharic-chatbot-backend.onrender.com/api

  # Admin Dashboard Frontend  
  - type: web
    name: amharic-chatbot-admin
    env: static
    plan: free
    repo: https://github.com/Daniel-Andu/Amharic-chatbot.git
    rootDir: admin-frontend
    buildCommand: npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://amharic-chatbot-backend.onrender.com/api
